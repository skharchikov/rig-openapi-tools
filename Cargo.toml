[package]
name = "rig-openapi-tools"
version = "0.1.0"
edition = "2021"
build = "build.rs"

[dependencies]
rig-core = "0.32"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
reqwest = { version = "0.12", features = ["json", "rustls-tls"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"

[build-dependencies]
serde = { version = "1", features = ["derive"] }
serde_yaml = "0.9"
serde_json = "1"
quote = "1"
proc-macro2 = "1"
anyhow = "1"
